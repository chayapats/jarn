name: "Run J.A.R.N. (headless)"
description: >
  Run J.A.R.N. in CI headless mode (-p) and expose the result, cost, and
  turn count as outputs. Requires Docker on the runner when using the default
  'ci' preset (ubuntu-latest runners have Docker; see docs/GITHUB_ACTION.md
  for docker-less overrides).

inputs:
  prompt:
    description: "The prompt to send to the agent."
    required: true
  model:
    description: >
      OpenRouter model slug (e.g. anthropic/claude-opus-4-8). Overrides the
      model set in the project config for this run.
    required: false
    default: ""
  permission_mode:
    description: >
      Permission mode: auto-edit (default), yolo, ask, or plan. This EXPLICIT
      mode wins over the preset's default mode (explicit > preset > config), so
      e.g. preset 'trusted-repo' + permission_mode 'auto-edit' runs in auto-edit
      even though the preset's own default is ask.
    required: false
    default: "auto-edit"
  max_turns:
    description: "Maximum agent turns (default 15)."
    required: false
    default: "15"
  preset:
    description: >
      Named policy preset. Default is 'ci' (yolo + Docker backend, fails
      closed if Docker is absent). For docker-less runners use --preset
      trusted-repo with permission_mode: auto-edit (see docs/GITHUB_ACTION.md).
    required: false
    default: "ci"
  api_key:
    description: >
      API key for the LLM provider (passed as OPENROUTER_API_KEY). Source
      this from secrets — never hardcode a literal key.
    required: true

outputs:
  result:
    description: "The agent's final text reply."
    value: ${{ steps.parse.outputs.result }}
  cost_usd:
    description: "Total session cost in USD (from the --json envelope)."
    value: ${{ steps.parse.outputs.cost_usd }}
  turns:
    description: "Number of agent turns completed."
    value: ${{ steps.parse.outputs.turns }}

runs:
  using: "composite"
  steps:
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install jarn-cli
      shell: bash
      run: npm i -g jarn-cli@0.5

    - name: Run jarn headless
      id: run_jarn
      shell: bash
      env:
        OPENROUTER_API_KEY: ${{ inputs.api_key }}
        PROMPT: ${{ inputs.prompt }}
        MODEL_OVERRIDE: ${{ inputs.model }}
        PERMISSION_MODE: ${{ inputs.permission_mode }}
        MAX_TURNS: ${{ inputs.max_turns }}
        PRESET: ${{ inputs.preset }}
      run: |
        set -euo pipefail
        # Build optional flags as an array so they aren't word-split / globbed.
        EXTRA_FLAGS=()
        if [ -n "$MODEL_OVERRIDE" ]; then
          EXTRA_FLAGS+=(--model "$MODEL_OVERRIDE")
        fi
        # Emit JSON envelope: {"result":…,"tokens":…,"cost":…,"turns":…,"tool_calls":…}
        JARN_OUTPUT=$(jarn -p "$PROMPT" \
          --json \
          --preset "$PRESET" \
          --permission-mode "$PERMISSION_MODE" \
          --max-turns "$MAX_TURNS" \
          --cwd "$GITHUB_WORKSPACE" \
          "${EXTRA_FLAGS[@]+"${EXTRA_FLAGS[@]}"}")
        # Use a RANDOM heredoc delimiter around the (untrusted) model output so a
        # reply that happens to contain a literal `EOF_JARN_OUT` line can't close
        # the block early and inject arbitrary step outputs (GitHub hardening guide).
        DELIM="EOF_$(openssl rand -hex 8)"
        {
          echo "jarn_output<<${DELIM}"
          echo "$JARN_OUTPUT"
          echo "${DELIM}"
        } >> "$GITHUB_OUTPUT"

    - name: Parse JSON output
      id: parse
      shell: bash
      # Read the jarn output from an env var (the runner quotes it safely) —
      # NEVER interpolate ${{ }} into an inline bash string: GitHub expands the
      # expression BEFORE bash runs, so quotes don't protect it. LLM output
      # containing an apostrophe would break the string, and crafted output
      # (from an un-gated PR diff → prompt → result) would be a shell-injection
      # path. The env-var indirection eliminates both.
      env:
        JARN_OUTPUT: ${{ steps.run_jarn.outputs.jarn_output }}
      run: |
        set -euo pipefail
        RESULT=$(printf '%s' "$JARN_OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['result'])")
        COST=$(printf '%s' "$JARN_OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['cost'])")
        TURNS=$(printf '%s' "$JARN_OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['turns'])")
        # Random delimiter around RESULT (derived from untrusted model output) so a
        # reply containing a literal `EOF_RESULT` line can't terminate the block early.
        DELIM="EOF_$(openssl rand -hex 8)"
        {
          echo "result<<${DELIM}"
          echo "$RESULT"
          echo "${DELIM}"
          echo "cost_usd=$COST"
          echo "turns=$TURNS"
        } >> "$GITHUB_OUTPUT"
