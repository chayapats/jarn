name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Build and publish the PyPI artifacts (sdist + wheel) via Trusted Publishing.
  pypi:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/jarn
    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publishing (no API token needed)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
      - uses: actions/upload-artifact@v4
        with:
          name: dist-pypi
          path: dist/*

  # Build standalone binaries per OS.
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: jarn-linux-x86_64
          - os: macos-latest
            asset: jarn-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: ./scripts/build-binary.sh
      - name: Rename asset
        run: mv dist/jarn "dist/${{ matrix.asset }}"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
