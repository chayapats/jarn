name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Re-run CI gates before any publish step — no release without a green preflight.
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run ruff check src tests scripts
      - run: uv run mypy src/
      - run: uv run pytest -q
      - run: uv run pytest tests/test_packaging.py -q

  # Build and publish the PyPI artifacts (sdist + wheel) via Trusted Publishing.
  pypi:
    needs: preflight
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/jarn
    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publishing (no API token needed)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true   # re-runs for an already-published version are no-ops, not failures
      - uses: actions/upload-artifact@v4
        with:
          name: dist-pypi
          path: dist/*

  # Build standalone binaries per OS/arch. Each one is both attached to the
  # GitHub Release and uploaded as a `binary-<target>` workflow artifact that the
  # npm job repackages.
  binaries:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            gh_asset: jarn-linux-x86_64
          - os: ubuntu-24.04-arm
            target: linux-arm64
            gh_asset: jarn-linux-arm64
          - os: macos-latest
            target: darwin-arm64
            gh_asset: jarn-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev --extra build
      - run: ./scripts/build-binary.sh
      - name: Smoke-test binary
        run: |
          ./dist/jarn --version
          # Fresh CI runners have no ~/.jarn/config.yaml — doctor reports ok:false
          # (exit 1) but must still emit valid JSON without crashing.
          json=$(./dist/jarn doctor --json || true)
          echo "$json" | python -c "import json,sys; d=json.load(sys.stdin); assert 'ok' in d"
      - name: Upload binary artifact (for the npm job)
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/jarn
          if-no-files-found: error
      - name: Rename asset
        run: mv dist/jarn "dist/${{ matrix.gh_asset }}"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.gh_asset }}

  # Assemble and publish the npm packages: one `jarn-cli-<target>` per platform
  # (each carrying its prebuilt binary) plus the `jarn-cli` launcher package whose
  # optionalDependencies pin those three to this exact version.
  npm:
    needs: [preflight, binaries]
    runs-on: ubuntu-latest
    environment: NPM_TOKEN   # the NPM_TOKEN secret lives in this environment (mirrors the pypi job)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Download all platform binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: binaries
      - name: Run launcher + assembly tests
        run: |
          node --test npm/jarn-cli/test/launcher.test.js
          node --test npm/test/build.test.mjs
      - name: Assemble npm packages
        run: node npm/build-packages.mjs --version "${GITHUB_REF_NAME#v}" --binaries binaries --out npm/dist
      - name: Smoke-test assembled npm binary
        run: |
          chmod +x npm/dist/jarn-cli-linux-x64/bin/jarn
          npm/dist/jarn-cli-linux-x64/bin/jarn --version
      # NOTE: no --provenance — npm provenance requires a PUBLIC source repo, and
      # this repo is private (open-core: public at launch). Re-add --provenance
      # (and id-token: write above) once the repo is public.
      - name: Publish to npm (platform packages first, then the launcher)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          while read -r dir; do
            [ -n "$dir" ] || continue
            echo "==> npm publish $dir"
            npm publish "$dir" --access public
          done < npm/dist/publish-order.txt
