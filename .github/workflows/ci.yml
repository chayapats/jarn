name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Sync deps
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check src tests
      - name: Type-check
        run: uv run mypy src/
      - name: Test
        run: uv run pytest -q
        # Live-LLM e2e suite is intentionally excluded from CI (slow / costs tokens).

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv build
      - run: uv run pytest tests/test_packaging.py -q

  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Launcher tests
        run: node --test npm/jarn-cli/test/launcher.test.js
      - name: Assembly-script tests
        run: node --test npm/test/build.test.mjs
