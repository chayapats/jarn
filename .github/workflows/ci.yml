name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Sync deps
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check src tests scripts
      # POSIX-only APIs (fcntl, killpg, …) are not modeled on win32; type-check on Unix.
      - name: Type-check
        if: runner.os != 'Windows'
        run: uv run mypy src/
      - name: Test
        run: >-
          uv run pytest -q
          --cov=src/jarn
          --cov-report=term-missing
          --cov-fail-under=74
        # Live-LLM e2e suite is intentionally excluded from CI (slow / costs tokens).

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv build
      - run: uv run pytest tests/test_packaging.py -q

  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Launcher tests
        run: node --test npm/jarn-cli/test/launcher.test.js
      - name: Assembly-script tests
        run: node --test npm/test/build.test.mjs

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync deps
        run: uv sync --extra dev
      - name: Dependency audit (pip-audit)
        run: |
          uv pip install pip-audit
          uv run pip-audit
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
