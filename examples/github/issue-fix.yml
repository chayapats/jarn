# Issue-Fix Bot — J.A.R.N.
#
# Triggered when an issue comment contains "@jarn".
# The bot checks out the repo, runs J.A.R.N. with the comment as the prompt,
# and opens a PR with the resulting changes.
#
# SECURITY — ACTOR ALLOWLIST (read before enabling):
#   Arbitrary users can comment on public issues, so we gate on
#   author_association.  Only OWNER, MEMBER (org member), or COLLABORATOR
#   may trigger this bot.  Review your threat model before widening this:
#   any actor who can trigger this workflow can write files to a new branch.
#   See docs/GITHUB_ACTION.md for an explicit allowlist alternative.
#
# Required repository secret: OPENROUTER_API_KEY
# Secrets hygiene: ALL keys are sourced from secrets.* — never hardcoded.
# Permissions: least-privilege (write code for the new branch + open PRs only).

name: "J.A.R.N. Issue-Fix Bot"

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  fix:
    # ACTOR ALLOWLIST GUARD — only trusted collaborators may trigger the bot.
    # author_association values: OWNER, MEMBER, COLLABORATOR, CONTRIBUTOR,
    # FIRST_TIMER, FIRST_TIME_CONTRIBUTOR, MANNEQUIN, NONE.
    if: >
      contains(github.event.comment.body, '@jarn') &&
      contains(
        fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'),
        github.event.comment.author_association
      )

    runs-on: ubuntu-latest   # ubuntu runners have Docker (required by ci preset)

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          # Use a deploy key or PAT if the default GITHUB_TOKEN cannot push
          # to protected branches — swap token: ${{ secrets.BOT_PAT }} here.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "jarn-bot"
          git config user.email "jarn-bot@users.noreply.github.com"

      - name: Run J.A.R.N. fix
        id: jarn
        uses: ./action                   # path to the composite action in this repo
        # When copying to another repo, change to: uses: chayapats/jarn/action@<tag>
        with:
          prompt: ${{ github.event.comment.body }}
          preset: "ci"                   # yolo + Docker; fails closed if Docker absent
          permission_mode: "auto-edit"
          max_turns: "15"
          api_key: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit changes
        id: commit
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          BRANCH="jarn/issue-${ISSUE_NUMBER}-fix"
          git checkout -b "$BRANCH"
          # Stage any files the agent modified.
          git add -A
          if git diff --cached --quiet; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
          else
            git commit -m "fix(#${ISSUE_NUMBER}): J.A.R.N. automated fix"
            git push origin "$BRANCH"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.commit.outputs.no_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.commit.outputs.branch }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          RESULT: ${{ steps.jarn.outputs.result }}
          COST: ${{ steps.jarn.outputs.cost_usd }}
          TURNS: ${{ steps.jarn.outputs.turns }}
        run: |
          set -euo pipefail
          gh pr create \
            --repo "$REPO" \
            --base main \
            --head "$BRANCH" \
            --title "fix(#${ISSUE_NUMBER}): J.A.R.N. automated fix" \
            --body "## J.A.R.N. automated fix

          Triggered by comment on issue #${ISSUE_NUMBER}.

          ### Summary

          ${RESULT}

          ---
          *Cost: \$${COST} · Turns: ${TURNS} · [jarn-cli](https://github.com/chayapats/jarn)*

          > **Review before merging** — this PR was generated by an automated agent."

      - name: Comment on issue (no changes)
        if: steps.commit.outputs.no_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          RESULT: ${{ steps.jarn.outputs.result }}
        run: |
          gh api --method POST \
            "repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            --field body="<!-- jarn-issue-fix -->
          **J.A.R.N.:** No file changes were made.

          ${RESULT}"
